{% extends "layouts/base.html" %}
{% block title %}Register - Sign Up{% endblock %}
{% block content %}
<section class="mb-5 mt-5">
    <div class="container">
        <div class="badge-wrap mb-5">
            <img src="{{ url_for('static',filename='img/effects/c_Arrow6-3.svg') }}" alt="arrow" class="arrow">
            <div class="text-block-m">Create New Account</div>
            <img src="{{ url_for('static',filename='img/effects/c_Arrow5-3.svg') }}" alt="arrow" class="arrow">
        </div>
        <div class="r-wrap d-flex justify-content-center mt-4">
            <div class="card features-card-wrap w-75">
                <div class="features-card-flex">
                    <img src="{{ url_for('static',filename='img/effects/circle.svg') }}" alt="bg-card-circle" class="feature-icon">
                    <div class="feature-card-title">
                        <h4 class="heading-s">
                            <img src="{{ url_for('static',filename='img/logo.png') }}" alt="logo" class="logo">
                        </h4>
                    </div>
                </div>
                <div class="card-body mt-4">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form action="{{ url_for('register') }}" method="POST">
                        <div class="form-row row">
                            <div class="form-group col-md-6">
                                <div data-mdb-input-init class="form-outline mb-4">
                                    <label class="form-label" for="username">Username</label>
                                    <input autocomplete="off" type="text" name="username" id="username" class="form-control" required />
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <div data-mdb-input-init class="form-outline mb-4">
                                    <label class="form-label" for="email">Email address</label>
                                    <input type="email" autocomplete="off" id="email" name="email" class="form-control" required />
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <div data-mdb-input-init class="form-outline mb-4">
                                    <label class="form-label" for="password">Password</label>
                                    <input type="password" autocomplete="off" name="password" id="password" class="form-control" style="-webkit-text-security: square;" required />
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <div data-mdb-input-init class="form-outline mb-4">
                                    <label class="form-label" for="country">Country</label>
                                    <input autocomplete="off" type="text" name="country" id="country" class="form-control" />
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <div data-mdb-input-init class="form-outline mb-4">
                                    <label class="form-label" for="language">Language</label>
                                    <select name="language" id="language" class="form-control">
                                        <option value="en">English</option>
                                        <option value="ar">Arabic</option>
                                        <option value="es">Spanish</option>
                                        <option value="fr">French</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group col-md-6">
                                <div data-mdb-input-init class="form-outline mb-4">
                                    <label class="form-label" for="api_provider">API Provider</label>
                                    <select name="api_provider" id="api_provider" class="form-control">
                                        <option value="google">Google</option>
                                        <option value="groq">Grok</option>
                                        <option value="openai">OpenAI</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group col-md-12">
                                <div data-mdb-input-init class="form-outline mb-4">
                                    <label class="form-label" for="api">API Key</label>
                                    <input autocomplete="off" type="text" name="api" id="api" class="form-control" />
                                </div>
                            </div>
                            <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-block mb-4">Sign Up</button>
                            <div class="text-center">
                                <span>Already have an account? <a href="{{ url_for('login') }}">Log in</a></span>
                            </div>
                        </div>
                    </form>
                </div>
                <img src="{{ url_for('static',filename='img/effects/grid-chart.avif') }}" class="image-9">
            </div>
        </div>
    </div>
    <img src="{{ url_for('static',filename='img/effects/light.avif') }}" alt="light" class="image-11">
</section>
{% endblock %}
