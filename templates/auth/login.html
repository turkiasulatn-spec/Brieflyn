{% extends "layouts/base.html" %}
{% block title %}Login - Sign In{% endblock %}
{% block content %}
<section class="main-section">
    <div class="container">
        <div class="badge-wrap mb-5">
            <img src="{{ url_for('static',filename='img/effects/c_Arrow6-3.svg') }}" alt="arrow" class="arrow">
            <div class="text-block-m">Welcome Back</div>
            <img src="{{ url_for('static',filename='img/effects/c_Arrow5-3.svg') }}" alt="arrow" class="arrow">
        </div>
        <div class="r-wrap d-flex justify-content-center">
            <div class="card features-card-wrap w-50">
                <div class="features-card-flex">
                    <img src="{{ url_for('static',filename='img/effects/circle.svg') }}" alt="bg-card-circle" class="feature-icon">
                    <div class="feature-card-title">
                        <h4 class="heading-s">
                            <img src="{{ url_for('static',filename='img/logo.png') }}" alt="logo" class="logo">
                        </h4>
                    </div>
                </div>
                <div class="card-body mt-4">
                    {% if error %}
                    <div class="alert alert-danger">{{ error }}</div>
                    {% endif %}
                    <form action="{{ url_for('login') }}" method="POST">
                        <div data-mdb-input-init class="form-outline mb-4">
                            <label class="form-label" for="email">Email address</label>
                            <input type="email" id="email" name="email" class="form-control" required />
                        </div>
                        <div data-mdb-input-init class="form-outline mb-4">
                            <label class="form-label" for="password">Password</label>
                            <input type="password" id="password" name="password" class="form-control" required />
                        </div>
                        <div class="row mb-4">
                            <div class="col d-flex justify-content-center">
                                <div class="form-check">
                                    <label class="form-check-label" for="remember"> Remember me </label>
                                    <input class="form-check-input" type="checkbox" value="1" id="remember" name="remember" checked />
                                </div>
                            </div>
                            <div class="col">
                                <a href="#!">Forgot password?</a>
                            </div>
                        </div>
                        <button type="submit" data-mdb-button-init data-mdb-ripple-init class="btn btn-primary btn-block mb-4">Sign in</button>
                        <div class="text-center">
                            <span>Not a member? <a href="{{ url_for('register') }}">Register</a></span>
                        </div>
                    </form>
                </div>
                <img src="{{ url_for('static',filename='img/effects/grid-chart.avif') }}" class="image-9">
            </div>
        </div>
    </div>
    <img src="{{ url_for('static',filename='img/effects/light.avif') }}" alt="light" class="image-11">
</section>
{% endblock %}
